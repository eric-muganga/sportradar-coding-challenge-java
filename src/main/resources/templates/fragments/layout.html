<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' | Sports Calendar'">Sports Calendar</title>
    <style>
        /* ── Reset & base ────────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f4f6f9;
            color: #1a1a2e;
            min-height: 100vh;
        }

        /* ── Navigation ──────────────────────────────────────────────── */
        nav {
            background: #1a1a2e;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        nav .brand {
            color: #e94560;
            font-size: 1.3rem;
            font-weight: 700;
            text-decoration: none;
            letter-spacing: 0.5px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 2rem;
        }

        nav ul li a {
            color: #ccc;
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        nav ul li a:hover { color: #e94560; }

        /* ── Page container ──────────────────────────────────────────── */
        .container {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        /* ── Page heading ────────────────────────────────────────────── */
        .page-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 1.5rem;
        }

        /* ── Buttons ─────────────────────────────────────────────────── */
        .btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            border: none;
            transition: opacity 0.2s;
        }

        .btn:hover { opacity: 0.85; }
        .btn-primary { background: #e94560; color: #fff; }
        .btn-secondary { background: #1a1a2e; color: #fff; }
        .btn-outline {
            background: transparent;
            border: 2px solid #1a1a2e;
            color: #1a1a2e;
        }

        /* ── Flash message ───────────────────────────────────────────── */
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            border-radius: 6px;
            padding: 0.8rem 1.2rem;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
        }

        /* ── Filter bar ──────────────────────────────────────────────── */
        .filter-bar {
            display: flex;
            gap: 1rem;
            align-items: flex-end;
            flex-wrap: wrap;
            background: #fff;
            padding: 1.2rem 1.5rem;
            border-radius: 10px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            margin-bottom: 1.5rem;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .filter-group label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-group select {
            padding: 0.45rem 0.8rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.9rem;
            background: #fff;
            color: #1a1a2e;
            cursor: pointer;
        }

        /* ── Event cards ─────────────────────────────────────────────── */
        .events-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .event-card {
            background: #fff;
            border-radius: 10px;
            padding: 1.2rem 1.5rem;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            display: grid;
            grid-template-columns: 120px 1fr auto;
            align-items: center;
            gap: 1.5rem;
            text-decoration: none;
            color: inherit;
            transition: box-shadow 0.2s, transform 0.1s;
        }

        .event-card:hover {
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
            transform: translateY(-1px);
        }

        .event-date {
            text-align: center;
        }

        .event-date .day {
            font-size: 2rem;
            font-weight: 700;
            color: #e94560;
            line-height: 1;
        }

        .event-date .month-year {
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
        }

        .event-date .time {
            font-size: 0.85rem;
            color: #555;
            margin-top: 0.2rem;
        }

        .event-matchup {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .event-matchup .teams {
            font-size: 1.1rem;
            font-weight: 700;
            color: #1a1a2e;
        }

        .event-matchup .meta {
            font-size: 0.85rem;
            color: #888;
        }

        .event-score {
            text-align: center;
            min-width: 80px;
        }

        .event-score .score {
            font-size: 1.4rem;
            font-weight: 700;
            color: #1a1a2e;
        }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.7rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-played    { background: #d4edda; color: #155724; }
        .status-scheduled { background: #cce5ff; color: #004085; }
        .status-cancelled { background: #f8d7da; color: #721c24; }
        .status-postponed { background: #fff3cd; color: #856404; }

        /* ── Empty state ─────────────────────────────────────────────── */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #888;
        }

        .empty-state p { font-size: 1.1rem; margin-bottom: 1rem; }

        /* ── Detail page ─────────────────────────────────────────────── */
        .detail-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .detail-header {
            background: #1a1a2e;
            color: #fff;
            padding: 2rem;
            text-align: center;
        }

        .detail-header .competition {
            font-size: 0.85rem;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .detail-header .matchup {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .detail-header .result-score {
            font-size: 2.5rem;
            font-weight: 700;
            color: #e94560;
        }

        .detail-body {
            padding: 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .detail-section h3 {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-bottom: 0.8rem;
            border-bottom: 1px solid #eee;
            padding-bottom: 0.4rem;
        }

        .detail-section p {
            font-size: 0.95rem;
            color: #333;
            margin-bottom: 0.4rem;
        }

        .detail-section p span {
            font-weight: 600;
            color: #1a1a2e;
        }

        /* ── Form ────────────────────────────────────────────────────── */
        .form-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.1);
            padding: 2rem;
            max-width: 700px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.2rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #444;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 0.6rem 0.8rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.95rem;
            color: #1a1a2e;
            background: #fff;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #e94560;
        }

        .field-error {
            color: #e94560;
            font-size: 0.8rem;
        }

        .form-actions {
            margin-top: 1.5rem;
            display: flex;
            gap: 1rem;
        }

        /* ── Responsive ──────────────────────────────────────────────── */
        @media (max-width: 640px) {
            .event-card {
                grid-template-columns: 80px 1fr;
            }
            .event-score { display: none; }
            .detail-body { grid-template-columns: 1fr; }
            .form-grid   { grid-template-columns: 1fr; }
        }
    </style>
</head>

<nav th:fragment="navbar">
    <a class="brand" href="/events">Sports Calendar</a>
    <ul>
        <li><a href="/events">Calendar</a></li>
        <li><a href="/events/new">Add Event</a></li>
    </ul>
</nav>
</html>
