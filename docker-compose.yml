services:
  postgres:
    image: postgres:16-alpine
    container_name: sports_postgres
    environment:
      POSTGRES_DB: sportsdb
      POSTGRES_USER: sports_user
      POSTGRES_PASSWORD: sports_pass
    ports:
      - "5432:5432"
    volumes:
      - sports_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sports_user -d sportsdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: sports_app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sportsdb
      SPRING_DATASOURCE_USERNAME: sports_user
      SPRING_DATASOURCE_PASSWORD: sports_pass
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  sports_postgres_data: